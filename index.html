<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Harness Engineer Roadmap</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell">
    <section class="card hero">
      <div>
        <p class="eyebrow">Career simulator</p>
        <h1>Build your AI Harness Engineer roadmap</h1>
        <p>Score your current skills, then generate a 30-day learning plan for orchestration work.</p>
      </div>
    </section>
    <section class="grid two-up">
      <article class="card stack">
        <h2>Rate your current level</h2>
        <div id="skills" class="stack"></div>
        <button id="generate">Generate roadmap</button>
      </article>
      <article class="card stack">
        <h2>Your plan</h2>
        <div id="score"></div>
        <ol id="plan"></ol>
      </article>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
